name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Test token access
        run: |
          curl -sf -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.RESUME_CONTENT_TOKEN }}" \
            https://api.github.com/repos/esburch/resume || true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.RESUME_CONTENT_TOKEN }}
          persist-credentials: true

      - name: Build resume from markdown
        run: python scripts/build_resume.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
